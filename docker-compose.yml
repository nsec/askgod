services:
  database:
    image: 'postgres:latest'
    ports:
      - 5432:5432
    networks:
      - askgod-network
    volumes:
      - ${PWD}/db-data/:/var/lib/postgresql
    environment:
      POSTGRES_USER: askgod # The PostgreSQL user (useful to connect to the database)
      POSTGRES_PASSWORD: askgod # The PostgreSQL password (useful to connect to the database)
      POSTGRES_DB: askgod # The PostgreSQL default database (automatically created at first launch)

  askgod-server:
    build: .
    ports:
      - 9080:9080
    networks:
      - askgod-network
    volumes:
      - ${PWD}/askgod.yaml:/askgod.yaml
    command: /askgod.yaml
    restart: on-failure
    depends_on:
      - database


networks:
  askgod-network:
    driver: bridge
